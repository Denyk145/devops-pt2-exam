name: Task1 Bootstrap

on:
  workflow_dispatch:
  push:
    paths:
      - 'task1/bootstrap/**'
      - '.github/workflows/task1-bootstrap.yml'

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_key_id: ${{ secrets.SPACES_ACCESS_KEY_ID }}
      TF_VAR_spaces_secret_access_key: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: task1/bootstrap
        run: terraform init

      - name: Terraform Format Check
        working-directory: task1/bootstrap
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: task1/bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: task1/bootstrap
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: task1/bootstrap
        run: terraform apply -auto-approve tfplan