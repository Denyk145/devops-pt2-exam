- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base dependencies
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - conntrack
      - socat
      - python3
      - python3-pip
    state: present

- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Install kubectl
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    rm -f kubectl
  args:
    creates: /usr/local/bin/kubectl
    executable: /bin/bash
  when: not ansible_check_mode

- name: Install Minikube
  shell: |
    curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    install minikube-linux-amd64 /usr/local/bin/minikube
    rm -f minikube-linux-amd64
  args:
    creates: /usr/local/bin/minikube
    executable: /bin/bash
  when: not ansible_check_mode

- name: Install Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
    executable: /bin/bash
  when: not ansible_check_mode

- name: Start Minikube
  shell: |
    minikube start \
      --driver=docker \
      --memory={{ minikube_memory }} \
      --cpus={{ minikube_cpus }} \
      --force \
      --container-runtime=docker \
      --alsologtostderr \
      --v=1
  args:
    creates: /root/.minikube/profiles/minikube/config.json
    executable: /bin/bash
  when: not ansible_check_mode

- name: Wait for Minikube to be ready
  shell: |
    minikube status
  args:
    executable: /bin/bash
  register: mk_status
  retries: 10
  delay: 15
  until: "'host: Running' in mk_status.stdout and 'kubelet: Running' in mk_status.stdout and 'apiserver: Running' in mk_status.stdout"
  changed_when: false
  when: not ansible_check_mode

- name: Enable ingress addon
  shell: |
    minikube addons enable ingress || true
  args:
    executable: /bin/bash
  changed_when: false
  when: not ansible_check_mode

- name: Check kubectl nodes
  shell: |
    minikube kubectl -- get nodes -o wide || true
  args:
    executable: /bin/bash
  register: kubectl_nodes
  changed_when: false
  when: not ansible_check_mode

- name: Show kubectl nodes
  debug:
    var: kubectl_nodes.stdout_lines
  when: not ansible_check_mode

- name: Check minikube status
  shell: |
    minikube status -p {{ minikube_profile }}
  args:
    executable: /bin/bash
  register: minikube_status
  changed_when: false
  when: not ansible_check_mode

- name: Show minikube status
  debug:
    var: minikube_status.stdout_lines
  when: not ansible_check_mode

- name: Check helm version
  command: helm version
  register: helm_version
  changed_when: false
  when: not ansible_check_mode

- name: Show helm version
  debug:
    var: helm_version.stdout_lines
  when: not ansible_check_mode