
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base dependencies
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
      - gnupg
      - lsb-release
      - conntrack
      - socat
      - cri-tools
      - docker.io
    state: present

- name: Enable and start docker
  systemd:
    name: docker
    enabled: yes
    state: started

- name: Add root to docker group
  user:
    name: root
    groups: docker
    append: yes

- name: Install kubectl
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    rm -f kubectl
  args:
    creates: /usr/local/bin/kubectl

- name: Install Minikube
  shell: |
    curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
    install minikube-linux-amd64 /usr/local/bin/minikube
    rm -f minikube-linux-amd64
  args:
    creates: /usr/local/bin/minikube

- name: Install Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Start Minikube
  shell: |
    minikube start --driver={{ minikube_driver }} --memory={{ minikube_memory }} --cpus={{ minikube_cpus }} --profile={{ minikube_profile }} --force
  args:
    creates: /root/.minikube/profiles/{{ minikube_profile }}/config.json

- name: Enable ingress addon
  shell: |
    minikube addons enable ingress --profile={{ minikube_profile }}
  changed_when: false

- name: Check kubectl nodes
  command: kubectl get nodes -o wide
  register: kubectl_nodes
  changed_when: false

- name: Show kubectl nodes
  debug:
    var: kubectl_nodes.stdout_lines

- name: Check minikube status
  command: minikube status --profile={{ minikube_profile }}
  register: minikube_status
  changed_when: false

- name: Show minikube status
  debug:
    var: minikube_status.stdout_lines

- name: Check helm version
  command: helm version
  register: helm_version
  changed_when: false

- name: Show helm version
  debug:
    var: helm_version.stdout_lines